services:
  db-init:
    image: debian:12.9-slim
    volumes:
      - db_data:/data
    command: >
      sh -c "apt-get update && apt-get install -y sqlite3 &&
             mkdir -p /data &&
             touch /data/swm_pool_utility.db &&
             sqlite3 /data/swm_pool_utility.db 'PRAGMA auto_vacuum = INCREMENTAL;' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS pools(id INTEGER PRIMARY KEY, name VARCHAR NOT NULL UNIQUE);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS weather_types(id INTEGER PRIMARY KEY, type VARCHAR NOT NULL UNIQUE);' &&
             sqlite3 /data/swm_pool_utility.db \"INSERT OR IGNORE INTO weather_types(type) VALUES ('clear'),('partly_cloudy'),('foggy'),('rain'),('snow'),('thunderstorm'),('unknown');\" &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS track_pools(id INTEGER PRIMARY KEY AUTOINCREMENT, pool_id INTEGER NOT NULL REFERENCES pools(id), dtime DATETIME DEFAULT CURRENT_TIMESTAMP, utility INT);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS weather(id INTEGER PRIMARY KEY AUTOINCREMENT, dtime DATETIME DEFAULT CURRENT_TIMESTAMP, temperature REAL, wind_speed REAL, wind_direction REAL, precipitation REAL, cloud_cover INT, weather_code INT, weather_type_id INTEGER NOT NULL REFERENCES weather_types(id));' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS daily_avg_cache(id INTEGER PRIMARY KEY AUTOINCREMENT, pool_id INTEGER NOT NULL REFERENCES pools(id), slot_index INT NOT NULL, mean_utilization REAL NOT NULL, std_dev REAL NOT NULL, sample_count INT NOT NULL, updated_at DATETIME DEFAULT CURRENT_TIMESTAMP, UNIQUE(pool_id, slot_index));' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE INDEX IF NOT EXISTS idx_track_pools_pool_id_dtime ON track_pools(pool_id, dtime, utility);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE INDEX IF NOT EXISTS idx_track_pools_dtime ON track_pools(dtime);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE INDEX IF NOT EXISTS idx_weather_dtime ON weather(dtime);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS weather_forecast(id INTEGER PRIMARY KEY AUTOINCREMENT, dtime DATETIME NOT NULL, temperature REAL, wind_speed REAL, precipitation REAL, cloud_cover INT, weather_code INT, weather_type_id INTEGER NOT NULL REFERENCES weather_types(id), fetched_at DATETIME);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE UNIQUE INDEX IF NOT EXISTS idx_weather_forecast_dtime ON weather_forecast(dtime);' &&
             sqlite3 /data/swm_pool_utility.db 'CREATE TABLE IF NOT EXISTS predictions(id INTEGER PRIMARY KEY AUTOINCREMENT, pool_name VARCHAR NOT NULL UNIQUE, current_util REAL NOT NULL, pred_1h REAL NOT NULL, pred_2h REAL NOT NULL, delta_1h REAL NOT NULL, delta_2h REAL NOT NULL, trend_strength REAL NOT NULL, trend_direction VARCHAR NOT NULL, model_version VARCHAR, created_at DATETIME DEFAULT CURRENT_TIMESTAMP, pred_series TEXT, UNIQUE(pool_name));' &&
             chmod 666 /data/swm_pool_utility.db"
    restart: "no"

  api:
    build: ./api
    volumes:
      - db_data:/data
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  pool-scraper:
    build: ./pool-scraper
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/swm_pool_utility.db
    restart: unless-stopped

  weather-scraper:
    build: ./weather
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/swm_pool_utility.db
    restart: unless-stopped

  daily-stats:
    build: ./daily-stats
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/swm_pool_utility.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8086:80"
    restart: unless-stopped
    depends_on:
      - api

  weather-forecast-scraper:
    build: ./weather-forecast
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/swm_pool_utility.db
    restart: unless-stopped

  ml-prediction:
    build: ./ml-prediction
    volumes:
      - db_data:/data
      - model_data:/models
    environment:
      - DB_PATH=/data/swm_pool_utility.db
      - MODEL_DIR=/models
    restart: unless-stopped
    depends_on:
      - weather-forecast-scraper

  ml-training:
    build: ./ml-training
    volumes:
      - db_data:/data
      - model_data:/models
    environment:
      - DB_PATH=/data/swm_pool_utility.db
      - MODEL_DIR=/models
      - RETRAIN_HOUR=2          # 02:00 Europe/Berlin
    command: ["--daemon"]
    restart: unless-stopped

volumes:
  db_data:
  model_data:
